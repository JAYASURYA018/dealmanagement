<div class="flex flex-col space-y-3">
    <!-- Back and Title -->
    <div class="flex items-center space-x-3 pt-1">
        <button (click)="goBack()" class="p-1 hover:bg-gray-100 rounded-full transition-colors">
            <span class="material-icons text-gray-700 text-[24px]">arrow_back</span>
        </button>
        <h1 class="text-[22px] font-semibold text-[#1a1b1e]">Select Products</h1>
    </div>

    <!-- Search Pill -->
    <div class="relative w-full">
        <input type="text" (input)="onSearch($event)" #searchInput [value]="searchQuery$ | async"
            class="block w-full pl-8 pr-12 py-2.5 border-none rounded-full bg-[#f0f3f8] text-gray-900 placeholder-gray-500 font-normal focus:outline-none focus:ring-0 transition-all text-[14px]"
            placeholder="Search by keyword">
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center gap-2">
            <span *ngIf="(searchQuery$ | async)"
                class="material-icons text-gray-400 hover:text-gray-600 text-[20px] cursor-pointer"
                (click)="clearSearch(searchInput)">close</span>
            <span class="material-icons text-gray-400 text-[20px] pointer-events-none">search</span>
        </div>
    </div>
</div>
